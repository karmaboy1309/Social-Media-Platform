<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Global Feed — Vibe Social Media Platform" />
  <title>Feed — Vibe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/profile.css" />
  <style>
    .feed-container { max-width: 600px; margin: 100px auto 60px; padding: 0 20px; }
    .feed-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .feed-title { font-size: 1.8rem; font-weight: 800; }
  </style>
</head>
<body>

  <!-- ═══════════ Animated Background ═══════════ -->
  <div class="bg-orbs" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <!-- ═══════════ Navigation ═══════════ -->
  <nav class="navbar scrolled" id="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">
        <span class="logo-icon">◈</span>
        <span class="logo-text">Vibe</span>
      </a>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html">Home</a></li>
        <li><a href="feed.html" class="active">Feed</a></li>
        <li><a href="search.html">Search</a></li>
        <li><a href="profile.html">Profile</a></li>
      </ul>
      <div class="nav-actions">
        <span class="nav-user" id="navUser"></span>
        <a href="create-post.html" class="btn btn-primary" style="padding: 8px 16px;">Create Post</a>
        <a href="#" class="btn btn-ghost" id="logoutBtn">Log Out</a>
      </div>
      <button class="mobile-toggle" id="mobileToggle" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- ═══════════ Feed Section ═══════════ -->
  <main class="feed-page">
    <div class="feed-container">
      <div class="feed-header">
        <h1 class="feed-title">Latest <span class="gradient-text">Vibes</span></h1>
      </div>

      <!-- Posts Grid -->
      <div class="profile-posts" id="feedPosts">
        <!-- Skeleton Loaders -->
        <div class="post-card skeleton-card">
          <div class="post-header">
            <div class="skeleton-avatar shimmer"></div>
            <div class="skeleton-text-group">
              <div class="skeleton-text shimmer" style="width: 120px;"></div>
              <div class="skeleton-text shimmer" style="width: 80px; height: 10px; margin-top: 8px;"></div>
            </div>
          </div>
          <div class="skeleton-text shimmer" style="width: 100%; margin-bottom: 10px;"></div>
          <div class="skeleton-text shimmer" style="width: 85%; margin-bottom: 20px;"></div>
          <div class="skeleton-img shimmer"></div>
        </div>
        <div class="post-card skeleton-card">
          <div class="post-header">
            <div class="skeleton-avatar shimmer"></div>
            <div class="skeleton-text-group">
              <div class="skeleton-text shimmer" style="width: 130px;"></div>
              <div class="skeleton-text shimmer" style="width: 90px; height: 10px; margin-top: 8px;"></div>
            </div>
          </div>
          <div class="skeleton-text shimmer" style="width: 95%; margin-bottom: 10px;"></div>
          <div class="skeleton-text shimmer" style="width: 60%; margin-bottom: 20px;"></div>
        </div>
      </div>
      
      <!-- Infinite Scroll Spinner -->
      <div id="loadingSpinner" style="display: none; text-align: center; padding: 24px 0;">
        <div style="display: inline-block; width: 32px; height: 32px; border: 3px solid rgba(168,85,247,0.2); border-top-color: var(--accent-2); border-radius: 50%; animation: spin 1s linear infinite;"></div>
      </div>

    </div>
  </main>
  
  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/socket.js"></script>
  <script src="js/feed.js"></script>
</body>
</html>
